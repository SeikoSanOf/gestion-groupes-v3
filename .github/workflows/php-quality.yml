name: Contrôle Qualité PHP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # On demande explicitement une version supérieure à 3.43
          tools: php-cs-fixer:3.64.0 
          coverage: none

      - name: Validate PHP syntax (Linter)
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Run PHP-CS-Fixer
        # IMPORTANT : On utilise 'php-cs-fixer' (installé par setup-php) 
        # et SURTOUT PAS './php-cs-fixer.phar' (votre vieux fichier)
        run: php-cs-fixer fix --dry-run --diff --ansi